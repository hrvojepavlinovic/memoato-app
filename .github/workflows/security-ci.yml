name: Security CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: security-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  application:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - name: Compile Wasp project
        run: |
          cp package-lock.json "$RUNNER_TEMP/memoato-reviewed-package-lock.json"
          npx --yes @wasp.sh/wasp-cli@0.20.2 build
      - name: Install patched generated dependencies
        run: |
          node scripts/patch_wasp_dependency_versions.mjs
          cp "$RUNNER_TEMP/memoato-reviewed-package-lock.json" package-lock.json
          npm ci --include=dev
          npm audit
      - name: Apply generated-code patches
        run: |
          node scripts/patch_wasp_email_templates.mjs
          node scripts/patch_wasp_verify_email_autologin.mjs
          node scripts/patch_wasp_oauth_types.mjs
          node scripts/patch_wasp_oauth_profile_sync.mjs
      - name: Test
        run: npm test
      - name: Regenerate Prisma client after clean install
        working-directory: .wasp/build/server
        run: npx prisma generate --schema='../db/schema.prisma'
      - name: Bundle server
        working-directory: .wasp/build/server
        run: npm run bundle
      - name: Build authenticated web app
        working-directory: .wasp/build/web-app
        env:
          REACT_APP_API_URL: https://api.memoato.com
        run: npm run build

  public-site:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/memoato-site
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/memoato-site/package-lock.json
      - run: npm ci
      - run: npm audit --omit=dev
      - run: npm run build

  mobile-dependencies:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json
      - run: npm ci
      - run: npm audit --omit=dev
