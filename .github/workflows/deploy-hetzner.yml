name: Deploy to Hetzner

permissions:
  contents: read

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-hetzner-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure SSH key
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          cat > ~/.ssh/id_ed25519 <<'EOF'
          ${{ secrets.HETZNER_DEPLOY_KEY }}
          EOF
          chmod 600 ~/.ssh/id_ed25519
          cat > ~/.ssh/known_hosts <<'EOF'
          91.98.33.74 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIJtEQGEnJjXGo63dmaqcN//112Rw6zIaMyX7uMsKdvHq
          EOF

      - name: Trigger remote deploy
        shell: bash
        run: |
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes -o IdentitiesOnly=yes -T deploy@91.98.33.74 <<'EOF'
          set -euo pipefail
          cd /srv/apps/memoato/app
          git fetch --quiet origin main
          git reset --hard --quiet origin/main
          ./scripts/hetzner/deploy-memoato.sh
          EOF
